<!DOCTYPE html>
<html lang="en" data-theme="catppuccin">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mono Board</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/logo.png" />
  <meta name="theme-color" content="#1e1e2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MonoVault" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/tabs/habits.css" />
  <link rel="stylesheet" href="/static/tabs/music.css" />
  <link rel="stylesheet" href="/static/tabs/workout.css" />
  <link rel="stylesheet" href="/static/tabs/food.css" />
  <link rel="stylesheet" href="/static/tabs/finance.css" />
  <link rel="stylesheet" href="/static/tabs/inbox.css" />
</head>
<body>
  <header>
    <div class="header-title">
      <img src="/assets/logo.png" class="header-logo" alt="Logo" />
      <div>
        <h1>MonoVault</h1>
        <div class="date" id="date-label"></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="window.location.href='{{ daily_note_uri }}'" title="Open today's note">
        <img src="/assets/daily-note.svg" alt="Today's note" />
      </button>
      <button class="header-btn" onclick="location.reload()" title="Refresh">
        <img src="/assets/refresh.svg" alt="Refresh" />
      </button>
      <button class="header-btn" onclick="toggleTheme()" id="header-btn-btn">
        <img id="theme-icon" src="/assets/dark-theme.svg" alt="Toggle theme" />
      </button>
    </div>
  </header>

  <div class="main">
    <div class="tabs">
      <button class="tab-btn" style="position:relative" onclick="switchTab('today')">
        <img src="/assets/today.svg" alt="Today" />
        <span class="inbox-tab-badge" id="tasks-tab-badge" style="display:none"></span>
      </button>
      <button class="tab-btn" onclick="switchTab('planning')"><img src="/assets/planning.svg" alt="Planning" /></button>
      <button class="tab-btn" style="position:relative" onclick="switchTab('inbox')">
        <img src="/assets/inbox.svg" alt="Inbox" />
        <span class="inbox-tab-badge" id="inbox-tab-badge" style="display:none"></span>
      </button>
      <button class="tab-btn" onclick="switchTab('habits')"><img src="/assets/habits.svg" alt="Habits" /></button>
      <button class="tab-btn" onclick="switchTab('finance')"><img src="/assets/finance.svg" alt="Finance" /></button>
      <button class="tab-btn" onclick="switchTab('workout')"><img src="/assets/workout.svg" alt="Workout" /></button>
      <button class="tab-btn" onclick="switchTab('music')"><img src="/assets/music.svg" alt="Music" /></button>
      <button class="tab-btn" onclick="switchTab('food')"><img src="/assets/food.svg" alt="Food" /></button>
    </div>

    {% include 'tabs/today.html' %}
    {% include 'tabs/habits.html' %}
    {% include 'tabs/planning.html' %}
    {% include 'tabs/inbox.html' %}
    {% include 'tabs/music.html' %}
    {% include 'tabs/workout.html' %}
    {% include 'tabs/food.html' %}
    {% include 'tabs/finance.html' %}
  </div>

  <!-- Shared dropdowns (position:fixed, shared between all popups) -->
  <div id="tag-suggestions-dropdown" class="vault-files-dropdown" style="display:none"></div>
  <div id="vault-files-dropdown" class="vault-files-dropdown" style="display:none"></div>

  <!-- Next action modal -->
  <div id="next-action-modal" class="inbox-modal-overlay" style="display:none" onclick="closeNextActionModal(event)">
    <div class="inbox-modal-card" onclick="event.stopPropagation()">
      <div class="inbox-modal-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="inbox-modal-title">What's next?</span>
          <span class="badge file" id="next-action-file-badge"></span>
        </div>
        <button class="inbox-close-btn" onclick="closeNextActionModal()">✕</button>
      </div>

      <div id="next-action-inline-section" style="display:none">
        <label class="inbox-label" style="display:block;margin-bottom:8px">Inline tasks in this project</label>
        <div id="next-action-inline-list"></div>
      </div>

      <div id="next-action-new-section">
        <label class="inbox-label" id="next-action-new-label" style="display:block;margin-bottom:8px">Add a next task</label>
        <div class="inbox-field">
          <textarea id="next-action-description" class="inbox-textarea" rows="2" placeholder="Task description..."></textarea>
        </div>
        <div class="inbox-fields-row">
          <div class="inbox-field">
            <label class="inbox-label">📅 Due</label>
            <input type="date" id="next-action-due" class="inbox-date-input" />
          </div>
          <div class="inbox-field">
            <label class="inbox-label">⏳ Scheduled</label>
            <input type="date" id="next-action-scheduled" class="inbox-date-input" />
          </div>
          <div class="inbox-field">
            <label class="inbox-label">🛫 Start</label>
            <input type="date" id="next-action-start" class="inbox-date-input" />
          </div>
        </div>
        <div class="inbox-fields-row">
          <div class="inbox-field">
            <label class="inbox-label">@ Time</label>
            <input type="time" id="next-action-time" />
          </div>
          <div class="inbox-field" style="flex:2">
            <label class="inbox-label">🔁 Recurrence</label>
            <select id="next-action-recur">
              <option value="">None</option>
              <option value="every 2 days">Every 2 days</option>
              <option value="every week">Every week</option>
              <option value="every 2 weeks">Every 2 weeks</option>
              <option value="every 3 weeks">Every 3 weeks</option>
              <option value="every month">Every month</option>
            </select>
          </div>
        </div>
        <div class="inbox-field">
          <label class="inbox-label">Tags</label>
          <div class="inbox-tags-container" id="next-action-tags-container">
            <input type="text" id="next-action-tag-input" class="inbox-tag-input" placeholder="Add tag and press Enter..." />
          </div>
        </div>
      </div>

      <div class="inbox-modal-actions">
        <button class="inbox-btn-secondary" onclick="closeNextActionModal()"
          style="width:auto;padding:0 16px;height:36px;font-size:0.85rem">Skip</button>
        <button class="inbox-btn-primary" id="next-action-confirm-btn" onclick="confirmNextAction()" title="Confirm" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Shared task edit popup -->
  <div id="task-edit-modal" class="inbox-modal-overlay" style="display:none" onclick="closeTaskPopup(event)">
    <div class="inbox-modal-card" onclick="event.stopPropagation()">
      <div class="inbox-modal-header">
        <span class="inbox-modal-title">Edit Task</span>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="refresh-btn inbox-obsidian-btn" id="task-popup-obsidian-btn" title="Open in Obsidian"
            onclick="openObsidianFile(this.dataset.relPath)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </button>
          <button class="inbox-close-btn" onclick="closeTaskPopup()">✕</button>
        </div>
      </div>

      <div class="inbox-field">
        <label class="inbox-label">Task</label>
        <textarea id="task-popup-description" class="inbox-textarea" rows="2" placeholder="Task description..." dir="auto"></textarea>
      </div>

      <div class="inbox-fields-row">
        <div class="inbox-field">
          <label class="inbox-label">📅 Due</label>
          <input type="date" id="task-popup-due" class="inbox-date-input" />
        </div>
        <div class="inbox-field">
          <label class="inbox-label">⏳ Scheduled</label>
          <input type="date" id="task-popup-scheduled" class="inbox-date-input" />
        </div>
        <div class="inbox-field">
          <label class="inbox-label">🛫 Start</label>
          <input type="date" id="task-popup-start" class="inbox-date-input" />
        </div>
      </div>

      <div class="inbox-fields-row">
        <div class="inbox-field">
          <label class="inbox-label">@ Time</label>
          <input type="time" id="task-popup-time" />
        </div>
        <div class="inbox-field" style="flex:2">
          <label class="inbox-label">🔁 Recurrence</label>
          <select id="task-popup-recur">
            <option value="">None</option>
            <option value="every 2 days">Every 2 days</option>
            <option value="every week">Every week</option>
            <option value="every 2 weeks">Every 2 weeks</option>
            <option value="every 3 weeks">Every 3 weeks</option>
            <option value="every month">Every month</option>
          </select>
        </div>
      </div>

      <div class="inbox-field">
        <label class="inbox-label">Tags</label>
        <div class="inbox-tags-container" id="task-popup-tags-container">
          <input type="text" id="task-popup-tag-input" class="inbox-tag-input" placeholder="Add tag and press Enter..." />
        </div>
      </div>

      <div class="inbox-field" style="position:relative">
        <label class="inbox-label">
          Move to page
          <span class="inbox-label-hint">(leave empty → Imploding Tasks)</span>
        </label>
        <input
          type="text"
          id="task-popup-target"
          placeholder="Start typing a page name..."
          autocomplete="off"
          oninput="_showVaultFileSuggestions(this)"
          onfocus="_showVaultFileSuggestions(this)"
        />
      </div>

      <div class="inbox-modal-actions">
        <button class="inbox-btn-danger" onclick="deleteTaskPopup()" title="Delete">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
        </button>
        <div style="display:flex;gap:8px">
          <button class="inbox-btn-secondary" onclick="saveTaskPopup()" title="Save">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/>
              <polyline points="7 3 7 8 15 8"/>
            </svg>
          </button>
          <button class="inbox-btn-secondary" onclick="doneTaskPopup()" title="Complete task">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </button>
          <button class="inbox-btn-primary" onclick="moveTaskPopup()" title="Move to page">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script src="/static/tabs/today.js"></script>
  <script src="/static/tabs/habits.js"></script>
  <script src="/static/tabs/planning.js"></script>
  <script src="/static/tabs/inbox.js"></script>
  <script src="/static/tabs/music.js"></script>
  <script src="/static/tabs/workout.js"></script>
  <script src="/static/tabs/food.js"></script>
  <script src="/static/tabs/finance.js"></script>
  <script>
    const _initTab = localStorage.getItem('activeTab') || 'today';
    switchTab(_initTab);
    if (_initTab !== 'today') loadTasks();
    if (_initTab !== 'inbox') { loadInboxItems(); inboxLoaded = true; }
  </script>
</body>
</html>
