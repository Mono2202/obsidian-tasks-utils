<div id="tab-finance" class="tab-panel">
  <div class="finance-month-nav">
    <button class="finance-month-btn" onclick="financeChangeMonth(-1)">&#8249;</button>
    <span id="finance-month-label"></span>
    <button class="finance-month-btn" onclick="financeChangeMonth(1)">&#8250;</button>
  </div>

  <div class="tasks-row">
    <div class="card" style="flex:1.4;min-width:0">
      <h2>Overview</h2>
      <div class="finance-chart-wrap">
        <svg id="finance-pie-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div id="finance-legend" class="finance-legend"></div>
    </div>

    <div class="card" style="flex:1;min-width:0">
      <h2>Add Expense</h2>
      <form class="finance-form" onsubmit="submitFinance(event)">
        <div class="finance-amount-row">
          <input type="number" id="finance-amount" placeholder="Amount" step="0.01" min="0.01" required />
          <select id="finance-category" required>
            <option value="">Category</option>
            <option>Food</option>
            <option>Groceries</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Entertainment</option>
            <option>Health</option>
            <option>Housing</option>
            <option>Utilities</option>
            <option>Gifts</option>
            <option>Other</option>
          </select>
        </div>
        <input type="text" id="finance-title" placeholder="What did you spend on?" required autocomplete="off" />
        <button type="submit" class="finance-submit-btn">Add</button>
        <div class="feedback" id="finance-feedback"></div>
      </form>
    </div>
  </div>

  <div class="card">
    <h2>Entries</h2>
    <div id="finance-entries"><div class="empty-state"><span class="spinner"></span> Loading...</div></div>
  </div>

  <div class="card">
    <div class="finance-subs-header">
      <h2>Subscriptions</h2>
      <span id="finance-subs-total" class="finance-subs-total"></span>
    </div>
    <div id="finance-subscriptions"><div class="empty-state"><span class="spinner"></span> Loading...</div></div>
  </div>
</div>
