<div id="tab-today" class="tab-panel">
  <div class="tasks-row">
    <div class="card">
      <div class="tasks-header">
        <h2>Today</h2>
      </div>
      <div id="tasks-list"><div class="empty-state"><span class="spinner"></span> Loading...</div></div>
    </div>
  </div>

  <div class="tasks-row">
    <div class="card">
      <h2>Add to Today</h2>
      <form id="today-form" onsubmit="submitToday(event)">
        <div class="form-row">
          <input type="text" id="today-task" placeholder="Task description..." required />
          <input type="time" id="today-time" />
          <button type="submit">Add</button>
        </div>
        <div class="feedback" id="today-feedback"></div>
      </form>
    </div>
  </div>
</div>
