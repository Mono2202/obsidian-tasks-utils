<div id="tab-today" class="tab-panel">
  <div class="tasks-row">
    <div class="card">
      <div class="tasks-header">
        <h2>Today</h2>
      </div>
      <div id="tasks-list"><div class="empty-state"><span class="spinner"></span> Loading...</div></div>
    </div>
  </div>

  <div class="tasks-row">
    <div class="card">
      <h2>Add to Today</h2>
      <form id="today-form" onsubmit="submitToday(event)">
        <div class="form-row">
          <input type="text" id="today-task" placeholder="Task description..." required />
          <input type="time" id="today-time" />
          <button type="submit" title="Add"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg></button>
        </div>
        <div class="feedback" id="today-feedback"></div>
      </form>
    </div>
  </div>
</div>
