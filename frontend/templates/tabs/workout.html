<div id="tab-workout" class="tab-panel">
  <div class="tasks-row">
    <div class="card" style="flex:2;min-width:0">
      <div class="tasks-header">
        <h2>Today's Workout</h2>
      </div>
      <div id="workout-list"><div class="empty-state"><span class="spinner"></span> Loading...</div></div>
      <form id="workout-form" onsubmit="addExercise(event)" style="margin-top:16px">
        <div class="workout-form-grid">
          <div class="workout-name-wrap">
            <input type="text" id="workout-name" placeholder="Exercise name" required autocomplete="off" />
            <div id="workout-suggestions" class="workout-suggestions"></div>
          </div>
          <input type="number" id="workout-sets" placeholder="Sets" min="1" required />
          <input type="number" id="workout-reps" placeholder="Reps" min="1" required />
          <input type="text" id="workout-weight" placeholder="Weight" autocomplete="off" required />
          <div class="workout-btn-group">
            <button type="submit" class="workout-add-btn">Add</button>
            <button type="button" class="workout-clear-btn" onclick="clearWorkoutForm()">Clear</button>
          </div>
        </div>
        <div id="workout-feedback" class="feedback"></div>
      </form>

      <div id="rest-timer-section" style="display:none">
        <div class="rest-timer-bar-track"><div id="rest-timer-bar" class="rest-timer-bar"></div></div>
        <div class="rest-timer-row">
          <span id="rest-timer-display" class="rest-timer-display">1:30</span>
          <div class="rest-timer-btns">
            <button class="rest-timer-btn" onclick="resetRestTimer()" title="Reset">↺</button>
            <button class="rest-timer-btn rest-timer-skip" onclick="stopRestTimer()" title="Skip">✕</button>
          </div>
        </div>
        <div class="rest-timer-duration-row">
          <button class="rest-timer-adj" onclick="_adjustRestDuration(-15)">−</button>
          <span id="rest-timer-dur-label"></span>
          <button class="rest-timer-adj" onclick="_adjustRestDuration(15)">+</button>
        </div>
      </div>
    </div>
    <div class="workout-side-col">
      <div class="card">
        <h2>Records</h2>
        <div id="workout-records"><div class="empty-state"><span class="spinner"></span> Loading...</div></div>
      </div>
      <div class="card">
        <h2>History</h2>
        <div id="workout-history"><div class="empty-state"><span class="spinner"></span> Loading...</div></div>
      </div>
    </div>
  </div>
</div>
