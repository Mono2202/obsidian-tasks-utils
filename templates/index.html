<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mono Board</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <style>
    :root[data-theme="dark"] {
      --bg: #1a1a1a;
      --surface: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #7c6af7;
      --accent-hover: #9b8df9;
      --danger: #e05c5c;
      --success: #4caf7a;
      --input-bg: #2e2e2e;
      --shadow: rgba(0,0,0,0.4);
    }
    :root[data-theme="light"] {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #ddd;
      --text: #1a1a1a;
      --text-muted: #666;
      --accent: #5a4de6;
      --accent-hover: #7060f0;
      --danger: #d94444;
      --success: #3a9e67;
      --input-bg: #f0f0f0;
      --shadow: rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      transition: background 0.2s, color 0.2s;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    h1 { font-size: 1.4rem; font-weight: 600; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

    .date { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }

    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .theme-toggle:hover { background: var(--input-bg); }

    .main { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    /* Tasks */
    #tasks-list { display: flex; flex-direction: column; gap: 8px; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 12px;
      background: var(--input-bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: opacity 0.2s;
    }

    .task-item.completing { opacity: 0.4; pointer-events: none; }

    .task-checkbox {
      width: 18px;
      height: 18px;
      margin-top: 1px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 0.95rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .task-meta {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.72rem;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--border);
      color: var(--text-muted);
    }
    .badge.time { background: #3a3060; color: #b8a9ff; border: 1px solid #6a50c055; }
    .badge.file { background: var(--border); color: var(--text-muted); border: 1px solid var(--border); }
    .badge.overdue { background: #4a1a1a; color: #ff7070; border: 1px solid #ff707055; font-weight: 600; }
    .badge.started { background: #0d2a3a; color: #5bc4f5; border: 1px solid #5bc4f555; font-weight: 600; }

    .task-item.overdue { border-color: #5a2020; }
    .task-item.started { border-color: #1a4a6a; }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 20px 0;
      font-size: 0.9rem;
    }

    .tasks-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: color 0.15s, border-color 0.15s;
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--text-muted); }

    /* Forms */
    .form-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    input[type="text"], input[type="time"] {
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="time"]:focus {
      border-color: var(--accent);
    }
    input[type="text"] { flex: 1; min-width: 160px; }
    input[type="time"] { width: 120px; }

    button[type="submit"] {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .feedback {
      font-size: 0.82rem;
      margin-top: 8px;
      min-height: 18px;
      transition: color 0.2s;
    }
    .feedback.ok { color: var(--success); }
    .feedback.err { color: var(--danger); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Mono Board</h1>
      <div class="date" id="date-label"></div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">Toggle theme</button>
  </header>

  <div class="main">
    <!-- Today's Tasks -->
    <div class="card">
      <div class="tasks-header">
        <h2>Today</h2>
        <button class="refresh-btn" onclick="loadTasks()">Refresh</button>
      </div>
      <div id="tasks-list"><div class="empty-state"><span class="spinner"></span> Loading...</div></div>
    </div>

    <!-- Add to Inbox -->
    <div class="card">
      <h2>Add to Inbox</h2>
      <form id="inbox-form" onsubmit="submitInbox(event)">
        <div class="form-row">
          <input type="text" id="inbox-task" placeholder="Task description..." required />
          <button type="submit">Add</button>
        </div>
        <div class="feedback" id="inbox-feedback"></div>
      </form>
    </div>

    <!-- Add to Today -->
    <div class="card">
      <h2>Add to Today</h2>
      <form id="today-form" onsubmit="submitToday(event)">
        <div class="form-row">
          <input type="text" id="today-task" placeholder="Task description..." required />
          <input type="time" id="today-time" />
          <button type="submit">Add</button>
        </div>
        <div class="feedback" id="today-feedback"></div>
      </form>
    </div>
  </div>

  <script>
    const dateLabel = document.getElementById('date-label');
    dateLabel.textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    const FOLDER_COLORS = {
      'Projects':  '#ffca3a',
      'Inbox':     '#ff595e',
      'Meta':      '#ff924c',
      'Resources': '#1982c4',
      'Areas':     '#8ac926',
      'Spam':      '#6a4c93',
    };

    function folderBadgeStyle(folder) {
      const color = FOLDER_COLORS[folder];
      if (!color) return '';
      return `background:${color}22; color:${color}; border:1px solid ${color}55;`;
    }

    function cleanTaskText(raw) {
      return raw
        .replace(/^-\s\[.\]\s*/, '')
        .replace(/#todo\s*/, '')
        .replace(/📅\s*\d{4}-\d{2}-\d{2}/, '')
        .replace(/⏳\s*\d{4}-\d{2}-\d{2}/, '')
        .replace(/@\d{2}:\d{2}/, '')
        .trim();
    }

    async function loadTasks() {
      const list = document.getElementById('tasks-list');
      list.innerHTML = '<div class="empty-state"><span class="spinner"></span> Loading...</div>';
      try {
        const res = await fetch('/today-tasks');
        const data = await res.json();
        const tasks = data.tasks;
        const today = new Date().toISOString().slice(0, 10);
        let ids = Object.keys(tasks);
        if (ids.length === 0) {
          list.innerHTML = '<div class="empty-state">No tasks for today.</div>';
          return;
        }

        const isOverdue = (t) => (t.due && t.due < today) || (t.scheduled && t.scheduled < today);
        const isStarted = (t) => !isOverdue(t) && t.start && t.start <= today;
        const overdueDate = (t) => (t.due && t.due < today ? t.due : t.scheduled) || '9999';
        const rank = (t) => isOverdue(t) ? 0 : isStarted(t) ? 2 : 1;
        ids.sort((a, b) => {
          const ra = rank(tasks[a]), rb = rank(tasks[b]);
          if (ra !== rb) return ra - rb;
          if (ra === 0) return overdueDate(tasks[a]).localeCompare(overdueDate(tasks[b]));
          return 0;
        });

        list.innerHTML = ids.map(id => {
          const t = tasks[id];
          const text = cleanTaskText(t.task);
          const overdue = isOverdue(t);
          const started = !overdue && t.start && t.start <= today;
          const overdueLabel = overdue ? (t.due && t.due < today ? t.due : t.scheduled) : null;
          const overdueBadge = overdue ? `<span class="badge overdue">Overdue · ${overdueLabel}</span>` : '';
          const startedBadge = started ? `<span class="badge started">Started · ${t.start}</span>` : '';
          const timeBadge = t.time ? `<span class="badge time">@ ${t.time}</span>` : '';
          const fileBadge = `<span class="badge file" style="${folderBadgeStyle(t.top_folder)}">${escapeHtml(t.file)}</span>`;
          const cls = overdue ? ' overdue' : started ? ' started' : '';
          return `
            <div class="task-item${cls}" id="task-${id}">
              ${t.completable ? `<input type="checkbox" class="task-checkbox" onchange="completeTask('${id}', this)" />` : `<span class="task-checkbox" title="Unsupported recurrence"></span>`}
              <div class="task-body">
                <div class="task-text">${escapeHtml(text)}</div>
                <div class="task-meta">${overdueBadge}${startedBadge}${timeBadge}${fileBadge}</div>
              </div>
            </div>`;
        }).join('');
      } catch (e) {
        list.innerHTML = `<div class="empty-state" style="color:var(--danger)">Failed to load tasks.</div>`;
      }
    }

    async function completeTask(id, checkbox) {
      const item = document.getElementById(`task-${id}`);
      item.classList.add('completing');
      try {
        const res = await fetch(`/complete-task/${id}`, { method: 'POST' });
        if (res.ok) {
          item.style.transition = 'opacity 0.3s';
          item.style.opacity = '0';
          setTimeout(() => item.remove(), 300);
        } else {
          const data = await res.json();
          alert(data.error || 'Failed to complete task.');
          checkbox.checked = false;
          item.classList.remove('completing');
        }
      } catch (e) {
        checkbox.checked = false;
        item.classList.remove('completing');
      }
    }

    async function submitInbox(e) {
      e.preventDefault();
      const input = document.getElementById('inbox-task');
      const feedback = document.getElementById('inbox-feedback');
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      feedback.textContent = '';
      try {
        const res = await fetch(`/add-task?task=${encodeURIComponent(input.value)}`);
        const data = await res.json();
        if (res.ok) {
          feedback.className = 'feedback ok';
          feedback.textContent = 'Added to Inbox.';
          input.value = '';
        } else {
          feedback.className = 'feedback err';
          feedback.textContent = data.error || 'Error.';
        }
      } catch (e) {
        feedback.className = 'feedback err';
        feedback.textContent = 'Request failed.';
      }
      btn.disabled = false;
    }

    async function submitToday(e) {
      e.preventDefault();
      const input = document.getElementById('today-task');
      const timeInput = document.getElementById('today-time');
      const feedback = document.getElementById('today-feedback');
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      feedback.textContent = '';
      let url = `/add-today-task?task=${encodeURIComponent(input.value)}`;
      if (timeInput.value) url += `&time=${encodeURIComponent(timeInput.value)}`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (res.ok) {
          feedback.className = 'feedback ok';
          feedback.textContent = 'Added to today.';
          input.value = '';
          timeInput.value = '';
          loadTasks();
        } else {
          feedback.className = 'feedback err';
          feedback.textContent = data.error || 'Error.';
        }
      } catch (e) {
        feedback.className = 'feedback err';
        feedback.textContent = 'Request failed.';
      }
      btn.disabled = false;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadTasks();
  </script>
</body>
</html>
